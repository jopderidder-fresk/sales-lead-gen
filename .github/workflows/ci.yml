name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'frontend/')
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-typecheck:
    name: "Backend: Type Check"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'frontend/')
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy app

  backend-test:
    name: "Backend: Test"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'frontend/')
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov --cov-report=xml

  frontend-lint:
    name: "Frontend: Lint"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'backend/')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check

  frontend-typecheck:
    name: "Frontend: Type Check"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'backend/')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  frontend-test:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      !contains(join(github.event.pull_request.*.changed_files, ','), 'backend/')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  frontend-types-check:
    name: "Frontend: API Types Up-to-Date"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: python -m scripts.export_openapi
        working-directory: backend
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run generate-types
        working-directory: frontend
      - name: Check generated types are committed
        run: git diff --exit-code frontend/src/types/generated.ts

  docker-build:
    name: "Docker: Build Images"
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, backend-test, frontend-lint, frontend-typecheck, frontend-test, frontend-types-check]
    if: always() && !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/backend.Dockerfile -t sales-backend:ci .
      - run: docker build -f docker/frontend.Dockerfile -t sales-frontend:ci .
